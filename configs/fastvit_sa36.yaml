# FastViT-SA36 experiment
backbone: fastvit_sa36
pretrained: true
pretrained_tag: apple_in1k
panoptic: true
n_classes: 5

epochs: 2000
batch: 8
grad_accum_steps: 1
lr0: 0.00001
lr_decoder: 0.0001
weight_decay: 0.1
warmup_epochs: 10

grad_checkpoint: true
amp: true
amp_dtype: bfloat16

cellprob_weight: 1.0
class_weight: 1.0
focal_gamma: 2.0
focal_alpha: auto

dataset: pannuke
train_folds: [1]
val_folds: [2]
test_folds: [3]
cache_flows: true

augment: true
scale_range: 0.5

project: runs
name: fastvit_sa36
