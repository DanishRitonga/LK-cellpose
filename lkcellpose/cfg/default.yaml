# LK-Cellpose default configuration
# Single source of truth for all configurable parameters

# Task & Mode
task: panoptic
mode: train

# Model
backbone: convnextv2_base
pretrained: true
pretrained_tag: fcmae_ft_in22k_in1k
decoder_channels: [512, 256, 128, 64, 32]
nout: 8
n_classes: 5
input_size: 256
grad_checkpoint: true
freeze_encoder: false

# Panoptic mode (false = instance-only with 3ch output)
panoptic: true

# Train
epochs: 2000
batch: 8
lr0: 0.1
weight_decay: 1.0e-5
optimizer: sgd
warmup_epochs: 10
lr_decay_milestones: [-100, -50]
lr_decay_factor: 10
min_lr_ratio: 0.01
momentum: 0.9
grad_accum_steps: 32
amp: true
amp_dtype: bfloat16
seed: 0
device: auto
workers: 8
save_period: -1

# Loss
flow_weight: 5.0
cellprob_weight: 1.0
cellprob_pos_weight: 3.0
class_weight: 1.0
focal_gamma: 2.0
focal_alpha: auto

# Data
dataset: pannuke
data_dir: null
train_folds: [1]
val_folds: [2]
test_folds: [3]
cache_flows: true
cleanup_cache: true
min_masks: 5

# Augmentation
augment: true
scale_range: [0.25, 4.0]
grayscale_prob: 0.1
invert_prob: 0.25
channel_dropout_prob: 0.1
brightness_std: 0.2
contrast_range: [-2.0, 2.0]
degradation_prob: 0.5
hflip: true
vflip: true
rotation: true

# Validation
val_interval: 1
patience: 100

# Prediction
tile_overlap: 0.1
cellprob_threshold: 0.0
flow_threshold: 0.4
min_size: 15
niter: 200

# Paths
project: runs
name: exp
exist_ok: false

# EMA
ema: true
ema_decay: 0.999
