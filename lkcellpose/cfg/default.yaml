# LK-Cellpose default configuration
# Single source of truth for all configurable parameters
# Updated to match Cellpose v4 training recipe

# Task & Mode
task: panoptic
mode: train

# Model
backbone: convnextv2_base
pretrained: true
pretrained_tag: fcmae_ft_in22k_in1k
decoder_channels: [512, 256, 128, 64, 32]
nout: 8
n_classes: 5
input_size: 256
grad_checkpoint: true
freeze_encoder: false

# Panoptic mode (false = instance-only with 3ch output)
panoptic: true

# Train — matching Cellpose v4 (AdamW, lr=1e-5, wd=0.1)
epochs: 2000
batch: 8
lr0: 0.00001
weight_decay: 0.1
optimizer: adamw
warmup_epochs: 10
grad_accum_steps: 1
amp: true
amp_dtype: bfloat16
seed: 0
device: auto
workers: 8
save_period: -1

# Loss — flow 5x scaling is hardcoded in PanopticLoss.FLOW_SCALE
# No flow_weight needed (5x is in the target, /2 is in the loss)
# No cellprob_pos_weight (cellpose v4 uses plain BCE)
cellprob_weight: 1.0
class_weight: 1.0
focal_gamma: 2.0
focal_alpha: auto

# Data
dataset: pannuke
data_dir: null
train_folds: [1]
val_folds: [2]
test_folds: [3]
cache_flows: true
cleanup_cache: true
min_masks: 5

# Augmentation — matching Cellpose v4
augment: true
scale_range: 0.5
grayscale_prob: 0.1
invert_prob: 0.25
channel_dropout_prob: 0.1
brightness_std: 0.2
contrast_range: [0.5, 1.5]
degradation_prob: 0.5
hflip: true
vflip: true
rotation: true

# Validation
val_interval: 1
patience: 100

# Prediction
tile_overlap: 0.1
cellprob_threshold: 0.0
flow_threshold: 0.4
min_size: 15
niter: 200

# Paths
project: runs
name: exp
exist_ok: false

# EMA
ema: true
ema_decay: 0.999
